<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Chifa Wok — Fusión China · Peruana</title>
<meta name="description" content="Chifa Wok — comida fusión china-peruana en Mendoza. Pedí por WhatsApp, delivery o retiro en local."/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>

<div id="root"></div>

<script>
window.__CW_TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": {
    "value": "gold",
    "colors": [
      "#b8881f",
      "#d9a441",
      "#1a1612"
    ]
  }
}/*EDITMODE-END*/;
</script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="menu-data.jsx"></script>
<script type="text/babel" src="app-shared.jsx"></script>
<script type="text/babel" src="app-screens.jsx"></script>
<script type="text/babel" src="app-web.jsx"></script>

<script type="text/babel">
const { useState: useStateMain, useEffect: useEffectMain } = React;

function applyAccent(name) {
  const map = {
    red:    { red: '#cd1a2b', redDark: '#9b121f', gold: '#d9a441' },
    orange: { red: '#e2641f', redDark: '#b34c11', gold: '#d9a441' },
    gold:   { red: '#b8881f', redDark: '#8a6517', gold: '#d9a441' },
  };
  const v = map[name] || map.red;
  Object.assign(window.TOKENS, v);
  document.documentElement.style.setProperty('--cw-red', v.red);
  document.documentElement.style.setProperty('--cw-red-dark', v.redDark);
  document.documentElement.style.setProperty('--cw-gold', v.gold);
}

function Root() {
  const [tweaks, setTweak] = useTweaks(window.__CW_TWEAKS_DEFAULTS);
  useEffectMain(() => applyAccent(tweaks.accent), [tweaks.accent]);

  return (
    <>
      <ChifaWokWeb/>
      <TweaksPanel title="Tweaks" defaultOpen={false}>
        <TweakSection title="Color de acento">
          <TweakColor
            value={tweaks.accent}
            onChange={v => setTweak('accent', v)}
            options={[
              { value: 'red',    colors: ['#cd1a2b', '#d9a441', '#1a1612'] },
              { value: 'orange', colors: ['#e2641f', '#d9a441', '#1a1612'] },
              { value: 'gold',   colors: ['#b8881f', '#d9a441', '#1a1612'] },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>

</body>
</html>
